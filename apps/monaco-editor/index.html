<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monaco Editor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    body { display: flex; flex-direction: column; background: #1e1e1e; }

    /* Toolbar */
    #toolbar {
      height: 36px; min-height: 36px;
      display: flex; align-items: center; justify-content: space-between;
      background: #252526; border-bottom: 1px solid #3c3c3c;
      padding: 0 8px; gap: 2px; user-select: none;
    }
    #toolbar-left, #toolbar-right { display: flex; align-items: center; gap: 2px; }
    #toolbar-right { gap: 8px; font-size: 12px; color: #858585; }
    .tb-btn {
      display: flex; align-items: center; justify-content: center;
      width: 28px; height: 28px; border: none; background: transparent;
      color: #cccccc; border-radius: 4px; cursor: pointer; padding: 0;
    }
    .tb-btn:hover { background: #3c3c3c; }
    .tb-btn:active { background: #505050; }
    .tb-btn.active { background: #37373d; color: #ffffff; }
    .tb-btn svg { width: 16px; height: 16px; fill: currentColor; }
    .tb-sep { width: 1px; height: 18px; background: #3c3c3c; margin: 0 4px; }
    .tb-info { padding: 0 6px; font-size: 12px; color: #858585; white-space: nowrap; }

    /* Editor */
    #editor { flex: 1; overflow: hidden; }

    /* Statusbar */
    #statusbar {
      height: 24px; min-height: 24px;
      display: flex; align-items: center; justify-content: space-between;
      background: #007acc; padding: 0 10px;
      font-size: 12px; color: #ffffff; user-select: none;
    }
    #statusbar-left, #statusbar-right { display: flex; align-items: center; gap: 12px; }
    .sb-item { white-space: nowrap; }

    /* Loading */
    #loading {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: #1e1e1e; color: #858585;
      font-size: 14px; z-index: 100;
    }
    #loading.hidden { display: none; }
  </style>
</head>
<body>
  <div id="loading">加载编辑器中...</div>
  <div id="toolbar">
    <div id="toolbar-left"></div>
    <div id="toolbar-right"></div>
  </div>
  <div id="editor"></div>
  <div id="statusbar">
    <div id="statusbar-left"></div>
    <div id="statusbar-right"></div>
  </div>
  <script src="/webos-sdk.js"></script>
  <script type="module" src="./src/main.ts"></script>
</body>
</html>
